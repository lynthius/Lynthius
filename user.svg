  <!-- Content -->
  <text x="16" y="20" fill="#39d353" xml:space="preserve">$ whoami</text>
  <text x="16" y="41" fill="#e6edf3" xml:space="preserve"></text>
  <text x="16" y="62" fill="#e6edf3" xml:space="preserve">  Tomasz Przyborowski  [/ˈtɔ.maʂ/]</text>
  <text x="16" y="83" fill="#8b949e" xml:space="preserve">  Fullstack Shopify Developer</text>
  <text x="16" y="104" fill="#8b949e" xml:space="preserve">  Theme dev (Dawn, Horizon)  ·  Custom Apps</text>
  <text x="16" y="125" fill="#8b949e" xml:space="preserve">  Poland  ·  coffee-driven</text>
  <text x="16" y="146" fill="#e6edf3" xml:space="preserve"></text>
  <text x="16" y="167" fill="#39d353" xml:space="preserve">$ cat about.txt</text>
  <text x="16" y="188" fill="#e6edf3" xml:space="preserve"></text>
  <text x="16" y="209" fill="#e6edf3" xml:space="preserve">  I build Shopify stores that are engineered, not assembled.</text>
  <text x="16" y="230" fill="#8b949e" xml:space="preserve">  Aesthetic and fast e-commerce experiences. Clean code. Smart structure.</text>
  <text x="16" y="251" fill="#8b949e" xml:space="preserve">  No unnecessary apps. If it needs to be fast, it's fast.</text>
  <text x="16" y="272" fill="#8b949e" xml:space="preserve">  If it needs to scale, it scales. If it's weird — we figure it out.</text>
  <text x="16" y="293" fill="#8b949e" xml:space="preserve">  Interested? Ping. Connect. Deploy.</text>
  <text x="16" y="314" fill="#e6edf3" xml:space="preserve"></text>
  <text x="16" y="335" fill="#39d353" xml:space="preserve">$ cat stack.txt</text>
  <text x="16" y="356" fill="#e6edf3" xml:space="preserve"></text>
  <text x="16" y="377" fill="#8b949e" xml:space="preserve">  // core</text>
  <text x="16" y="398" fill="#e6edf3" xml:space="preserve">  shopify  ·  liquid  ·  javascript  ·  graphql  ·  node</text>
  <text x="16" y="419" fill="#e6edf3" xml:space="preserve">  vite  ·  gulp  ·  gcp  ·  webflow  ·  hexo</text>
  <text x="16" y="440" fill="#e6edf3" xml:space="preserve"></text>
  <text x="16" y="461" fill="#8b949e" xml:space="preserve">  // exploring</text>
  <text x="16" y="482" fill="#e6edf3" xml:space="preserve">  typescript  ·  react  ·  python  ·  vercel</text>
  <text x="16" y="503" fill="#e6edf3" xml:space="preserve"></text>
  <text x="16" y="524" fill="#39d353" xml:space="preserve">$ git log --oneline | wc -l</text>
  <text x="16" y="545" fill="#8b949e" xml:space="preserve">  → 11314 commits  ·  0 repositories</text>
  <text x="16" y="566" fill="#e6edf3" xml:space="preserve"></text>
  <text x="16" y="587" fill="#39d353" xml:space="preserve">$ cat languages.txt</text>
  <text x="16" y="608" fill="#e6edf3" xml:space="preserve"></text>
  <text x="16" y="629" fill="#e6edf3" xml:space="preserve"></text>
  <text x="16" y="650" fill="#39d353" xml:space="preserve">$ spotify-cli --recently-played</text>
  <text x="16" y="671" fill="#e6edf3" xml:space="preserve">  ⏸  Unholy — White Poison</text>
  <text x="16" y="692" fill="#e6edf3" xml:space="preserve"></text>
