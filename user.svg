  <text x="16" y="41" fill="#e6edf3" xml:space="preserve"></text>
  <text x="16" y="62" fill="#e6edf3" xml:space="preserve">  Tomasz Przyborowski  [/ˈtɔ.maʂ/]</text>
  <text x="16" y="83" fill="#8b949e" xml:space="preserve">  Fullstack Shopify Developer</text>
  <text x="16" y="104" fill="#8b949e" xml:space="preserve">  Theme dev (Dawn, Horizon)  ·  Custom Apps</text>
  <text x="16" y="125" fill="#8b949e" xml:space="preserve">  Poland  ·  coffee-driven</text>
  <text x="16" y="146" fill="#e6edf3" xml:space="preserve"></text>
  <text x="16" y="167" fill="#e6edf3" xml:space="preserve">  I build Shopify stores that are engineered, not assembled.</text>
  <text x="16" y="188" fill="#8b949e" xml:space="preserve">  Aesthetic and fast e-commerce experiences. Clean code. Smart structure.</text>
  <text x="16" y="209" fill="#8b949e" xml:space="preserve">  No unnecessary apps. If it needs to be fast, it's fast.</text>
  <text x="16" y="230" fill="#8b949e" xml:space="preserve">  If it needs to scale, it scales. If it's weird — we figure it out.</text>
  <text x="16" y="251" fill="#8b949e" xml:space="preserve">  Interested? Ping. Connect. Deploy.</text>
  <text x="16" y="272" fill="#e6edf3" xml:space="preserve"></text>
